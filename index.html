<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>타로마스터 지안이 알려주는 타로</title>
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        :root {
            /* 컬러 시스템 (A. 리디자인 스타일 기준) */
            --bg-color: #fdfcff;
            --card-white: #ffffff;
            --card-dark: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
            --text-main: #191f28;
            --text-sub: #8b95a1;
            --primary: #4f46e5;

            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-full: 9999px;

        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fdfcff;
            background-image:
                radial-gradient(at 80% 0%, hsla(250, 100%, 85%, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(320, 100%, 90%, 0.4) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(200, 100%, 85%, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(190, 100%, 85%, 0.4) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
            padding-bottom: max(24px, env(safe-area-inset-bottom, 20px));

            /* 모바일 최적화 레이아웃 */
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        /* 데스크톱: body 에 적절한 padding 조정 */
        @media (min-width: 640px) {
            body {
                max-width: 600px;
                padding-bottom: 100px;
            }
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 1. 상단 탑바 (피드 / 날짜 배지) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 24px 12px 24px;
            padding-top: max(24px, env(safe-area-inset-top));
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary) 0%, #d946ef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            height: 38px;
            width: auto;
            object-fit: contain;
            flex-shrink: 0;
        }

        .date-badge {
            background-color: var(--card-white);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hero-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 34px;
            margin-bottom: 0px;
            /* 겹치지 않고 선이 딱 맞닿게 여백 조정 */
            margin-top: 10px;
            position: relative;
            z-index: 10;
        }

        .hero-text {
            font-size: 1.4rem;
            line-height: 1.4;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.03em;
            word-break: keep-all;
            padding-bottom: 35px;
        }

        .hero-image-wrap {
            position: relative;
            width: 180px;
            height: 165px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .hero-glow {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .brand-character {
            position: relative;
            z-index: 2;
            width: 160px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
            transform: translateY(0px);
        }

        @keyframes floating {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* 3. 메인 배너 카드 (밤하늘 테마) */
        .main-card-wrapper {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .dark-card {
            background-color: #0a1128;
            background-image: url('./img/star_bg.png');
            background-size: cover;
            background-position: center right;
            border-radius: var(--radius-xl);
            padding: 60px 35px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 180px;
            gap: 16px;
            box-shadow: 0 12px 30px rgba(10, 17, 40, 0.3);
            z-index: 1;
        }

        .dark-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(10, 17, 40, 0.8) 0%, rgba(10, 17, 40, 0.1) 80%, transparent 100%);
            z-index: -1;
        }

        /* ✨ 반짝이는 별 파티클 */
        .twinkle-star {
            position: absolute;
            border-radius: 50%;
            background: #ffffff;
            pointer-events: none;
            z-index: 0;
            animation: twinkle var(--dur, 2s) ease-in-out var(--delay, 0s) infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0.3);
            }

            30% {
                opacity: 1;
                transform: scale(1);
            }

            60% {
                opacity: 0.5;
                transform: scale(0.7);
            }
        }

        /* 수정구슬 주변 글로우 오버레이 */
        .orb-glow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(160, 130, 255, 0.25) 0%, rgba(80, 60, 200, 0.1) 50%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: orb-pulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes orb-pulse {

            0%,
            100% {
                transform: translateY(-50%) scale(1);
                opacity: 0.7;
            }

            50% {
                transform: translateY(-50%) scale(1.18);
                opacity: 1;
            }
        }


        .dark-card-title {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.5;
            z-index: 2;
            max-width: 75%;
        }

        .dark-card-btn {
            background: var(--card-white);
            color: #1e3a8a;
            padding: 14px 20px;
            border-radius: var(--radius-full);
            font-size: 0.95rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: flex-start;
            z-index: 2;
            transition: transform 0.2s;
        }

        .dark-card-btn:active {
            transform: scale(0.96);
        }

        /* 4. 흰색 리스트 카드 (서브 메뉴) */
        .list-card-wrapper {
            padding: 0 20px;
            margin-bottom: 20px;
        }

        .white-card {
            background: var(--card-white);
            border-radius: var(--radius-xl);
            padding: 24px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
        }

        .white-card-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        .study-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-radius: var(--radius-xl);
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            background: #ffffff;
        }

        .study-banner:last-child {
            margin-bottom: 0;
        }

        .study-banner:active {
            transform: scale(0.97);
        }

        /* 개별 배너 배경 및 보더 (심플하고 세련된 디자인) */
        .study-banner-1 {
            background: rgba(79, 70, 229, 0.02);
            border-color: rgba(79, 70, 229, 0.1);
        }

        .study-banner-2 {
            background: rgba(236, 72, 153, 0.02);
            border-color: rgba(236, 72, 153, 0.1);
        }

        .study-banner-3 {
            background: rgba(245, 158, 11, 0.02);
            border-color: rgba(245, 158, 11, 0.1);
        }

        .study-banner-4 {
            background: rgba(16, 185, 129, 0.02);
            border-color: rgba(16, 185, 129, 0.1);
        }

        .study-banner:hover {
            transform: translateY(-2px);
            background: #ffffff;
            /* 호버 시 조금 더 선명해 보이도록 */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border-color: rgba(255, 255, 255, 0.8);
        }

        .banner-content {
            display: flex;
            align-items: center;
            gap: 18px;
            z-index: 2;
        }

        .banner-icon-bg {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            /* 스퀘어 라운드 스타일 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
        }

        .study-banner:hover .banner-icon-bg {
            transform: scale(1.1) rotate(5deg);
        }

        /* 아이콘별 고유 배경색 (그라데이션) */
        .icon-bg-1 {
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            color: #4338ca;
        }

        .icon-bg-2 {
            background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
            color: #db2777;
        }

        .icon-bg-3 {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            color: #d97706;
        }

        .icon-bg-4 {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: #059669;
        }

        .custom-icon {
            width: 42px;
            height: 42px;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.08));
        }

        .banner-text-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .banner-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .banner-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: 600;
            opacity: 0.9;
        }

        .banner-arrow {
            color: #d1d5db;
            font-weight: 800;
            font-size: 1.2rem;
            z-index: 2;
            transition: transform 0.2s;
        }

        .study-banner:hover .banner-arrow {
            transform: translateX(4px);
            color: var(--text-main);
        }

        /* 5. 푸터 (카피라이트) */
        .footer-section {
            text-align: center;
            padding: 10px 20px 40px;
            color: var(--text-sub);
            font-size: 0.8rem;
            font-weight: 700;
            line-height: 1.6;
        }
    </style>
</head>

<body>

    <!-- 1. 상단 탑바 영역 -->
    <header class="top-bar">
        <h1 class="page-title">
            <img src="./img/logo_jian.png" alt="로고" class="logo-icon">
        </h1>
        <div class="date-badge" id="currentDate">
            <!-- JS로 동적 할당 -->
            11.10 금요일 🌙 2°
        </div>
    </header>

    <!-- 2. 메인 히어로 섹션 -->
    <section class="hero-section">
        <div class="hero-text">
            타로 지안이<br>
            당신의 운세를<br>
            읽어 드릴게요.
        </div>
        <div class="hero-image-wrap">
            <div class="hero-glow"></div>
            <img src="./img/cha.png" alt="타로마스터 지안" class="brand-character"
                onerror="this.src='https://cdn-icons-png.flaticon.com/512/3236/3236307.png'">
        </div>
    </section>

    <!-- 3. 메인 배너 카드 (Dark Theme) -->
    <section class="main-card-wrapper">
        <div class="dark-card" id="darkCard">
            <!-- 수정구슬 글로우 오버레이 -->
            <div class="orb-glow"></div>
            <div class="dark-card-title">
                오늘 하루,<br>
                나의 운세 흐름을 확인해 보세요!
            </div>
            <a href="tarot_01.html" class="dark-card-btn">
                오늘의 운세 보기 →
            </a>
        </div>
    </section>

    <!-- 4. 서브 리스트 카드 -->
    <section class="list-card-wrapper">
        <div class="white-card">
            <div class="white-card-title">오늘의 타로 공부</div>

            <a href="tarot_02.html" class="study-banner study-banner-1">
                <div class="banner-content">
                    <div class="banner-icon-bg icon-bg-1"><img src="./img/icon_yinyang.png" class="custom-icon" alt="주역"
                            onerror="this.outerHTML='🗃︎'"></div>
                    <div class="banner-text-group">
                        <span class="banner-title">주역타로 시작하기</span>
                        <span class="banner-desc">64괘 한 눈에 파악하는 법</span>
                    </div>
                </div>
                <div class="banner-arrow">→</div>
            </a>

            <a href="tarot_03.html" class="study-banner study-banner-2">
                <div class="banner-content">
                    <div class="banner-icon-bg icon-bg-2"><img src="./img/icon_magichat.png" class="custom-icon"
                            alt="유니버셜" onerror="this.outerHTML='🧙‍♀️'"></div>
                    <div class="banner-text-group">
                        <span class="banner-title">유니버셜 웨이트</span>
                        <span class="banner-desc">타로카드의 정석 마스터하기</span>
                    </div>
                </div>
                <div class="banner-arrow">→</div>
            </a>

            <a href="tarot_04.html" class="study-banner study-banner-3">
                <div class="banner-content">
                    <div class="banner-icon-bg icon-bg-3"><img src="./img/icon_moonstar.png" class="custom-icon"
                            alt="벨린" onerror="this.outerHTML='⭐'"></div>
                    <div class="banner-text-group">
                        <span class="banner-title">호로스코프 벨린</span>
                        <span class="banner-desc">직관적인 상징으로 읽어내기</span>
                    </div>
                </div>
                <div class="banner-arrow">→</div>
            </a>

            <a href="arrange.html" class="study-banner study-banner-4">
                <div class="banner-content">
                    <div class="banner-icon-bg icon-bg-4"><img src="./img/icon_arrange.png" class="custom-icon"
                            alt="배열법" onerror="this.outerHTML='🃏'"></div>
                    <div class="banner-text-group">
                        <span class="banner-title">카드 배열법</span>
                        <span class="banner-desc">다양한 스프레드 배열 한눈에 보기</span>
                    </div>
                </div>
                <div class="banner-arrow">→</div>
            </a>
        </div>
    </section>

    <footer class="footer-section">
        © 2026 Taro JIAN, All Rights Reserved.
    </footer>

    <script>
        // 현재 날짜 동적 표시 스크립트 (A. 스타일)
        const dateElement = document.getElementById('currentDate');
        const now = new Date();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const weekArr = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const week = weekArr[now.getDay()];

        // 날씨 값은 임의의 아이콘/온도로 데코레이션
        const weatherIcons = ['🌙', '☀️', '☁️', '❄️'];
        const randomIcon = weatherIcons[Math.floor(Math.random() * weatherIcons.length)];
        const randomTemp = Math.floor(Math.random() * 20) + '°';

        // 템플릿: 11.10 금요일 🌙 2°
        dateElement.innerHTML = `${month}.${day} ${week} &nbsp;${randomIcon} ${randomTemp}`;

        // ✨ 반짝이는 별 파티클 생성
        (function createTwinkleStars() {
            const card = document.getElementById('darkCard');
            if (!card) return;
            const STAR_COUNT = 28;
            for (let i = 0; i < STAR_COUNT; i++) {
                const star = document.createElement('div');
                star.className = 'twinkle-star';
                // 카드 오른쪽(수정구슬 주변) 위주로 배치, 일부는 전체 분산
                const rightBias = Math.random() < 0.65; // 65%는 오른쪽에 집중
                const xPct = rightBias
                    ? 45 + Math.random() * 52  // 45%~97% 오른쪽 영역
                    : Math.random() * 45;       // 0%~45% 왼쪽 영역
                const yPct = 5 + Math.random() * 90;
                const size = 1.5 + Math.random() * 3;   // 1.5px ~ 4.5px
                const dur = 1.2 + Math.random() * 2.5; // 1.2s ~ 3.7s
                const delay = Math.random() * 3;         // 0s ~ 3s

                star.style.cssText = [
                    `left: ${xPct}%`,
                    `top: ${yPct}%`,
                    `width: ${size}px`,
                    `height: ${size}px`,
                    `--dur: ${dur.toFixed(2)}s`,
                    `--delay: ${delay.toFixed(2)}s`,
                    // 별마다 살짝 다른 색감
                    `background: hsl(${220 + Math.random() * 80}, 80%, ${85 + Math.random() * 15}%)`,
                    `box-shadow: 0 0 ${(size * 2).toFixed(1)}px ${size.toFixed(1)}px rgba(200,180,255,0.6)`,
                ].join(';');
                card.appendChild(star);
            }
        })();
    </script>
</body>

</html>
