<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>타로마스터 지안이 알려주는 타로</title>
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquareround.css">
    <style>
        :root {
            /* 컬러 시스템 (A. 리디자인 스타일 기준) */
            --bg-color: #f2f4f6;
            --card-white: #ffffff;
            --card-dark: linear-gradient(135deg, #1e3a8a 0%, #312e81 100%);
            --text-main: #191f28;
            --text-sub: #8b95a1;
            --primary: #4f46e5;

            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-full: 9999px;

            --nav-height: 72px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'NanumSquareRound', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.5;
            padding-bottom: calc(var(--nav-height) + env(safe-area-inset-bottom, 20px));

            /* 모바일 최적화 레이아웃 */
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            background-image: radial-gradient(at 90% 10%, rgba(200, 210, 230, 0.5) 0%, transparent 40%);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* 1. 상단 탑바 (피드 / 날짜 배지) */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 24px 12px 24px;
            padding-top: max(24px, env(safe-area-inset-top));
        }

        .page-title {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary) 0%, #d946ef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .date-badge {
            background-color: var(--card-white);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-main);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 2. 히어로 섹션 (메인 카피 + 캐릭터) */
        .hero-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 24px;
            margin-bottom: 5px;
            margin-top: 10px;
        }

        .hero-text {
            font-size: 1.4rem;
            line-height: 1.45;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.03em;
            word-break: keep-all;
            padding-bottom: 40px;
        }

        .hero-image-wrap {
            position: relative;
            width: 150px;
            height: 185px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .hero-glow {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.8) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .brand-character {
            position: relative;
            z-index: 2;
            width: 140px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.15));
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        /* 3. 메인 배너 카드 (밤하늘 테마) */
        .main-card-wrapper {
            padding: 0 20px;
            margin-bottom: 24px;
        }

        .dark-card {
            background-color: #0a1128;
            background-image: url('./img/star_bg.png');
            background-size: cover;
            background-position: center right;
            border-radius: var(--radius-xl);
            padding: 60px 35px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 180px;
            gap: 16px;
            box-shadow: 0 12px 30px rgba(10, 17, 40, 0.3);
            z-index: 1;
        }

        .dark-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(10, 17, 40, 0.8) 0%, rgba(10, 17, 40, 0.1) 80%, transparent 100%);
            z-index: -1;
        }

        /* ✨ 반짝이는 별 파티클 */
        .twinkle-star {
            position: absolute;
            border-radius: 50%;
            background: #ffffff;
            pointer-events: none;
            z-index: 0;
            animation: twinkle var(--dur, 2s) ease-in-out var(--delay, 0s) infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0.3);
            }

            30% {
                opacity: 1;
                transform: scale(1);
            }

            60% {
                opacity: 0.5;
                transform: scale(0.7);
            }
        }

        /* 수정구슬 주변 글로우 오버레이 */
        .orb-glow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(160, 130, 255, 0.25) 0%, rgba(80, 60, 200, 0.1) 50%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: orb-pulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes orb-pulse {

            0%,
            100% {
                transform: translateY(-50%) scale(1);
                opacity: 0.7;
            }

            50% {
                transform: translateY(-50%) scale(1.18);
                opacity: 1;
            }
        }


        .dark-card-title {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.5;
            z-index: 2;
            max-width: 75%;
        }

        .dark-card-btn {
            background: var(--card-white);
            color: #1e3a8a;
            padding: 14px 20px;
            border-radius: var(--radius-full);
            font-size: 0.95rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            align-self: flex-start;
            z-index: 2;
            transition: transform 0.2s;
        }

        .dark-card-btn:active {
            transform: scale(0.96);
        }

        /* 4. 흰색 리스트 카드 (서브 메뉴) */
        .list-card-wrapper {
            padding: 0 20px;
            margin-bottom: 40px;
        }

        .white-card {
            background: var(--card-white);
            border-radius: var(--radius-xl);
            padding: 24px 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
        }

        .white-card-title {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        .list-item {
            background: var(--bg-color);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        .list-item:last-child {
            margin-bottom: 0;
        }

        .list-item:active {
            background: #e5e8eb;
        }

        .list-icon {
            font-size: 1.3rem;
            filter: grayscale(0.8) opacity(0.7);
        }

        .list-text {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 5. 하단 네비게이션 바 (Bottom Nav) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: calc(var(--nav-height) + env(safe-area-inset-bottom, 0px));
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom, 0px);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-sub);
            width: 20%;
            height: 100%;
            font-size: 0.75rem;
            font-weight: 700;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--text-main);
        }

        .nav-icon {
            font-size: 1.4rem;
            margin-bottom: 2px;
            line-height: 1;
        }

        .active .nav-icon {
            color: #191f28;
            font-weight: 900;
            text-shadow: 0 0 1px #191f28;
        }

        .nav-item span {
            white-space: nowrap;
            letter-spacing: -0.5px;
        }
    </style>
</head>

<body>

    <!-- 1. 상단 탑바 영역 -->
    <header class="top-bar">
        <h1 class="page-title">
            <img src="./img/logo.png" alt="로고" class="logo-icon">
            지안 타로
        </h1>
        <div class="date-badge" id="currentDate">
            <!-- JS로 동적 할당 -->
            11.10 금요일 🌙 2°
        </div>
    </header>

    <!-- 2. 메인 히어로 섹션 -->
    <section class="hero-section">
        <div class="hero-text">
            타로마스터 지안이<br>
            당신의 운세를<br>
            읽어 드릴게요.
        </div>
        <div class="hero-image-wrap">
            <div class="hero-glow"></div>
            <img src="./img/cha.png" alt="타로마스터 지안" class="brand-character"
                onerror="this.src='https://cdn-icons-png.flaticon.com/512/3236/3236307.png'">
        </div>
    </section>

    <!-- 3. 메인 배너 카드 (Dark Theme) -->
    <section class="main-card-wrapper">
        <div class="dark-card" id="darkCard">
            <!-- 수정구슬 글로우 오버레이 -->
            <div class="orb-glow"></div>
            <div class="dark-card-title">
                오늘 하루,<br>
                나의 운세 흐름을 확인해 보세요!
            </div>
            <a href="tarot_01.html" class="dark-card-btn">
                오늘의 운세 보기 〉
            </a>
        </div>
    </section>

    <!-- 4. 서브 리스트 카드 -->
    <section class="list-card-wrapper">
        <div class="white-card">
            <div class="white-card-title">오늘의 타로 공부</div>

            <a href="tarot_02.html" class="list-item">
                <span class="list-icon">🗃︎</span>
                <span class="list-text">주역타로 64괘 한 눈에 공부하기 ></span>
            </a>

            <a href="tarot_03.html" class="list-item">
                <span class="list-icon">🧙‍♀️</span>
                <span class="list-text">유니버셜 웨이트 카드 공부하기 ></span>
            </a>

            <a href="tarot_04.html" class="list-item">
                <span class="list-icon">⭐</span>
                <span class="list-text">호로스코프 벨린 카드 공부하기 ></span>
            </a>
        </div>
    </section>

    <!-- 5. 하단 고정 네비게이션 탭바 -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <div class="nav-icon">☰</div>
            <span>피드</span>
        </a>
        <a href="tarot_01.html" class="nav-item">
            <div class="nav-icon">🔮</div>
            <span>오늘의 운세</span>
        </a>
        <a href="tarot_02.html" class="nav-item">
            <div class="nav-icon">🗃︎</div>
            <span>주역타로</span>
        </a>
        <a href="tarot_03.html" class="nav-item">
            <div class="nav-icon">🧙‍♀️</div>
            <span>유니버셜</span>
        </a>
        <a href="tarot_04.html" class="nav-item">
            <div class="nav-icon">⭐</div>
            <span>벨린</span>
        </a>
    </nav>

    <script>
        // 현재 날짜 동적 표시 스크립트 (A. 스타일)
        const dateElement = document.getElementById('currentDate');
        const now = new Date();
        const month = now.getMonth() + 1;
        const day = now.getDate();
        const weekArr = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
        const week = weekArr[now.getDay()];

        // 날씨 값은 임의의 아이콘/온도로 데코레이션
        const weatherIcons = ['🌙', '☀️', '☁️', '❄️'];
        const randomIcon = weatherIcons[Math.floor(Math.random() * weatherIcons.length)];
        const randomTemp = Math.floor(Math.random() * 20) + '°';

        // 템플릿: 11.10 금요일 🌙 2°
        dateElement.innerHTML = `${month}.${day} ${week} &nbsp;${randomIcon} ${randomTemp}`;

        // ✨ 반짝이는 별 파티클 생성
        (function createTwinkleStars() {
            const card = document.getElementById('darkCard');
            if (!card) return;
            const STAR_COUNT = 28;
            for (let i = 0; i < STAR_COUNT; i++) {
                const star = document.createElement('div');
                star.className = 'twinkle-star';
                // 카드 오른쪽(수정구슬 주변) 위주로 배치, 일부는 전체 분산
                const rightBias = Math.random() < 0.65; // 65%는 오른쪽에 집중
                const xPct = rightBias
                    ? 45 + Math.random() * 52  // 45%~97% 오른쪽 영역
                    : Math.random() * 45;       // 0%~45% 왼쪽 영역
                const yPct = 5 + Math.random() * 90;
                const size = 1.5 + Math.random() * 3;   // 1.5px ~ 4.5px
                const dur = 1.2 + Math.random() * 2.5; // 1.2s ~ 3.7s
                const delay = Math.random() * 3;         // 0s ~ 3s

                star.style.cssText = [
                    `left: ${xPct}%`,
                    `top: ${yPct}%`,
                    `width: ${size}px`,
                    `height: ${size}px`,
                    `--dur: ${dur.toFixed(2)}s`,
                    `--delay: ${delay.toFixed(2)}s`,
                    // 별마다 살짝 다른 색감
                    `background: hsl(${220 + Math.random() * 80}, 80%, ${85 + Math.random() * 15}%)`,
                    `box-shadow: 0 0 ${(size * 2).toFixed(1)}px ${size.toFixed(1)}px rgba(200,180,255,0.6)`,
                ].join(';');
                card.appendChild(star);
            }
        })();
    </script>
</body>

</html>
