<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지니의 하루 주역 타로</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquare@2.0/nanumsquareround.css">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            /* 메인 화면과 통일된 테마 */
            --bg-gradient: linear-gradient(135deg, #7F5AFF 0%, #5D3FD3 100%);
            --bg-gray: #F5F7FA;
            --text-dark: #191F28;
            --text-gray: #888888;
            --card-bg: #ffffff;
            --shadow-soft: 0 8px 25px rgba(0,0,0,0.08);
            --accent-purple: #7F5AFF;
            --accent-gold: #FFD700;
        }

        body { 
            font-family: 'NanumSquareRound', sans-serif; 
            background-color: var(--bg-gray);
            color: var(--text-dark);
            text-align: center; 
            margin: 0; padding: 0;
            min-height: 100vh; overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }

	   .container { 
            max-width: 500px; margin: 0 auto; 
            padding: 20px 20px 100px 20px; position: relative; 
        }	
		
       /* 헤더 영역 */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0 20px 0; margin-bottom: 20px;
            position: relative;
        }

        /* 백 버튼: 검은색 화살표 */
        .back-btn {
            position: absolute; 
            top: 25px; left: 20px;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s ease;
        }
        .back-btn:hover { transform: scale(1.1); }
        
        /* 화살표 아이콘 색상 (검정) */
        .back-btn svg {
            width: 28px; height: 28px; 
            fill: #333333; 
        }

        h1 {
            font-size: 1.8rem; font-weight: 800; margin: 30px 0 10px 0;
            color: var(--text-dark);
        }

        .subtitle { 
            font-size: 1.0rem; opacity: 0.7; font-weight: 600; 
            margin-bottom: 10px; color: var(--text-gray);
        }

        /* 3D 고양이 (위치 조정) */
        .deco-cat {
            width: 80px; position: absolute; right: 20px; top: 15px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }


        /* 카드 공통 스타일 */
        .card-box { perspective: 1000px; cursor: pointer; position: relative; transition: 0.3s; }
        .card-box:hover { transform: translateY(-5px); }

        .card-inner { 
            width: 100%; height: 100%; position: relative; 
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); 
            border-radius: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        
        .card-face { 
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden; 
            border-radius: 16px; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; box-sizing: border-box; overflow: hidden;
        }

        /* 카드 뒷면 디자인 (패턴 유지) */
        .card-front { 
            background: linear-gradient(135deg, #7F5AFF, #5D3FD3);
            border: 3px solid #fff; 
            outline-offset: -6px;
        }
        
        .card-front::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%, rgba(255,255,255,0.1)), 
                linear-gradient(45deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.1) 75%, rgba(255,255,255,0.1));
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.3;
        }

        .card-front::after {
            content: "🔮"; font-size: 3rem; filter: drop-shadow(0 0 5px rgba(255,215,0,0.5));
        }
        
        .card-back { background: #fff; transform: rotateY(180deg); border: 2px solid #7F5AFF; }
        .card-back img { width: 100%; height: 100%; object-fit: contain; }

        /* 카드 레이아웃 */
        .total-card-wrapper { margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .total-card-box { width: 160px; height: 260px; }
        .time-label { 
            font-size: 1.1rem; color: #5D3FD3; margin-bottom: 10px; font-weight: 800; 
        }

        .card-wrapper { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 40px; }
        .card-container { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .small-label { font-size: 1.1rem; color: #555; margin-bottom: 8px; font-weight: 700; }
        .small-card-box { width: 100%; aspect-ratio: 2/3.2; max-width: 120px; } 
        .small-card-box .card-front::after { font-size: 1.3rem; }

        /* 버튼 스타일 */
        .draw-btn { 
            background: var(--bg-gradient);
            color: white; border: none; padding: 20px 0; width: 95%; border-radius: 50px; 
            font-family: 'NanumSquareRound', sans-serif; font-size: 1.2rem; font-weight: 800; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(93, 63, 211, 0.3); 
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .draw-btn:active { transform: scale(0.98); }

        /* 결과 리포트 */
        #result-area { display: none; margin-top: 30px; animation: slideUp 0.6s ease-out; }
        
        .report-card {
            background: white;
            border-radius: 20px; padding: 25px; margin-bottom: 20px;
            text-align: left; box-shadow: var(--shadow-soft);
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .report-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #F0F0F0; padding-bottom: 12px; margin-bottom: 15px;
        }
        .report-title { font-size: 1.1rem; color: #333; font-weight: 800; display: flex; align-items: center; gap: 6px; }
        
        .weather-badge { 
            background: #F3F0FF; color: #7F5AFF;
            padding: 5px 12px; border-radius: 15px; font-size: 1.0rem; font-weight: 700;
        }
        
        .report-body h3 { 
            font-size: 1.1rem; color: #5D3FD3; margin: 0 0 12px 0; font-weight: 800;
        }
        .report-detail { font-size: 1.0rem; line-height: 1.6; margin-bottom: 6px; color: #555; }
        .report-detail strong { color: #333; font-weight: 700; margin-right: 5px; }

        /* 행운 아이템 섹션 */
        .lucky-section-wrapper {
            background: linear-gradient(135deg, #fff 0%, #F8F9FA 100%);
            border-radius: 20px; padding: 25px; margin-top: 30px;
            box-shadow: var(--shadow-soft); border: 2px solid #7F5AFF;
        }
        .lucky-title {
            color: #7F5AFF; font-size: 1.1rem; margin-bottom: 15px; font-weight: 800;
        }
        .lucky-value { 
            font-size: 1.1rem; font-weight: 800; color: #333;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .color-dot {
            width: 16px; height: 16px; border-radius: 50%; display: inline-block;
            border: 2px solid rgba(0,0,0,0.1);
        }

        /* 하단 버튼 그룹 */
        .bottom-actions { margin-top: 30px; display: none; flex-direction: column; gap: 10px; }
        
        .action-row { display: flex; gap: 10px; }
        
        .sub-btn {
            flex: 1; background: white; color: #555; border: 1px solid #ddd;
            padding: 12px; border-radius: 15px; font-weight: 700; cursor: pointer;
            font-family: 'NanumSquareRound', sans-serif; transition: 0.2s; font-size: 1.0rem; 
        }
        .sub-btn:hover { background: #f9f9f9; color: #7F5AFF; border-color: #7F5AFF; }

        .save-btn {
            background: #333; color: white; border: none; width: 100%;
            padding: 14px; border-radius: 15px; font-weight: 700; cursor: pointer;
            font-family: 'NanumSquareRound', sans-serif; font-size: 1.0rem; 
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        if (score >= 90) return { icon: "☀️", label: "매우 맑음" };
        if (score >= 70) return { icon: "🌤️", label: "맑음" };

        return { icon: "🌧️", label: "흐리고 비" };
    }

    function calculateScore(card) {
        if (card.isDestiny) return card.baseScore;
        return Math.min(100, Math.max(0, card.baseScore + (Math.floor(Math.random() * 7) - 3)));
    }

    function getLuckyInfo() {
        const colors = [
            { name: '골드', code: '#FFD700' },

        const randomColor = colors[Math.floor(Math.random() * colors.length)];

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(440 + (flippedCount * 100), audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880 + (flippedCount * 100), audioCtx.currentTime + 0.3);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function handleMainAction() {
        if (flippedCount < 4) {
            flipCard(flippedCount);
        } else {
            drawCard();
        }
    }

    function handleCardClick(index) {
        if (flippedCount === index) flipCard(index);
    }

    function flipCard(index) {
        const cardInner = document.getElementById(`cardInner${index}`);
        if (!cardInner.classList.contains('flipped')) {
            playMagicSound();
            cardInner.classList.add('flipped');
            flippedCount++;
            
            const btnLabels = ["아침 운세 뽑기", "점심 운세 뽑기", "저녁 운세 뽑기", "카드 다시 뽑기"];
            document.getElementById('mainBtn').innerText = btnLabels[flippedCount-1];

            if (flippedCount === 4) {
                setTimeout(() => { 
                    const resultArea = document.getElementById('result-area');
                    resultArea.style.display = 'block'; 
                    document.getElementById('bottomActions').style.display = 'flex';
                    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 600);
            }
        }
    }

    function drawCard() {
        initAudio();
        flippedCount = 0;
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('bottomActions').style.display = 'none';
        document.getElementById('mainBtn').innerText = "오늘의 총운 뽑기";
        document.getElementById('luckyArea').innerHTML = ""; 

        const ids = ['Total', 'Morning', 'Afternoon', 'Evening'];
        const labels = ['오늘의 총운', '아침 운세', '점심 운세', '저녁 운세'];
        const icons = ['✨', '☀️', '🕛', '🌙'];
        
        for (let i = 0; i < 4; i++) {
            document.getElementById(`cardInner${i}`).classList.remove('flipped');
            const card = tarotData[Math.floor(Math.random() * tarotData.length)];
            document.getElementById(`cardImage${i}`).src = card.img;
            
            const score = calculateScore(card);
            const weather = getWeatherInfo(score);
            
            document.getElementById(`report${ids[i]}`).innerHTML = `
                <div class="report-header">
                    <div class="report-title"><span>${icons[i]}</span>${labels[i]}</div>
                    <div class="weather-badge">${weather.icon} ${score}점</div>
                </div>
                <div class="report-body">
                    <h3>${card.name}</h3>
                    <div class="report-detail"><strong>풀이:</strong> ${card.total}</div>
                    <div class="report-detail"><strong>💼 사업:</strong> ${card.bus}</div>
                    <div class="report-detail"><strong>❤️ 연애:</strong> ${card.lov}</div>
                    <div class="report-detail"><strong>🍎 건강:</strong> ${card.hea}</div>
                </div>
            `;
        }

        const lucky = getLuckyInfo();
        const luckyHtml = `
            <div class="lucky-section-wrapper">
                <div class="lucky-title">✨ 오늘의 행운 아이템 ✨</div>
                <div class="lucky-value">
                    <span>행운의 숫자: ${lucky.number}</span>
                    <span style="margin: 0 10px; color:#ddd;">|</span>
                    <span class="color-dot" style="background-color:${lucky.color.code}"></span>
                    <span>${lucky.color.name}</span>
                </div>
            </div>`;
        document.getElementById('luckyArea').innerHTML = luckyHtml;
    }

    // 결과 저장 함수 (화이트 테마에 맞춰 배경색 수정)
    function saveResult() {
        const resultArea = document.getElementById('result-area');
        
        html2canvas(resultArea, { 
            backgroundColor: "#F5F7FA", // 배경색을 밝은 회색으로 변경
            scale: 2,
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = '지니의_주역타로_결과.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    async function shareToFriends() {
        if (navigator.share) {
            try {
                await navigator.share({
                    title: '지니의 하루 주역 타로',
                    text: '오늘의 운세를 확인해보세요! ✨',
                    url: window.location.href,
                });
            } catch (error) {
                console.log('공유 실패:', error);
            }
        } else {
            alert('이 브라우저에서는 공유 기능을 지원하지 않습니다.');
        }
    }

    window.onload = drawCard;
</script>
</body>
</html>
